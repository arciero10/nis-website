# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - app-nazionaleitalianasanitari-test

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci

      - name: Build application
        run: |
          npm run build

      - name: Prepare standalone deploy package
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -R .next/standalone/. deploy/
          mkdir -p deploy/public
          cp -R public/. deploy/public/
          mkdir -p deploy/.next/static
          cp -R .next/static/. deploy/.next/static/
          test -f deploy/server.js

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A022CC18217F4B58B37549D2F6A850A4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A71E84B543F0485487A56C9DDEE99B8E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DB36E3BECF224DA482EC3AB734C379D2 }}

      - name: Configure Azure startup command
        uses: azure/cli@v2
        with:
          inlineScript: |
            RESOURCE_GROUP=$(az webapp list --query "[?name=='app-nazionaleitalianasanitari-test'].resourceGroup | [0]" -o tsv)
            az webapp config set \
              --resource-group "$RESOURCE_GROUP" \
              --name "app-nazionaleitalianasanitari-test" \
              --startup-file "node server.js"

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-nazionaleitalianasanitari-test'
          slot-name: 'Production'
          package: deploy
          
